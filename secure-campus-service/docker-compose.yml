version: '3.8'

services:
  web:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    networks:
      - campus-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secure_password
      MYSQL_DATABASE: campus_db
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - campus-network

networks:
  campus-network:
    driver: bridge

volumes:
  db_data:



